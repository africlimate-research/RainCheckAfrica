<svg width="500" height="280" viewBox="0 0 500 280" xmlns="http://www.w3.org/2000/svg">
  <title>RainCheck Africa</title>
  <desc>RainCheck Africa logo — navy cloud with white checkmark, dashed rain, green wordmark</desc>

  <!-- Cloud — CMYK 74,53,0,51 → #213c7d -->
  <ellipse cx="210" cy="100" rx="52" ry="38" fill="#213c7d"/>
  <ellipse cx="255" cy="90" rx="48" ry="36" fill="#213c7d"/>
  <ellipse cx="298" cy="100" rx="44" ry="34" fill="#213c7d"/>
  <ellipse cx="232" cy="118" rx="38" ry="24" fill="#213c7d"/>
  <ellipse cx="274" cy="120" rx="36" ry="22" fill="#213c7d"/>
  <rect x="162" y="110" width="184" height="28" rx="6" fill="#213c7d"/>

  <!-- Checkmark — white -->
  <polyline points="222,107 242,128 288,80" fill="none" stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dashed rain — lighter navy -->
  <line x1="182" y1="144" x2="172" y2="178" stroke="#4a6bbf" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="5 7"/>
  <line x1="208" y1="144" x2="198" y2="178" stroke="#4a6bbf" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="5 7"/>
  <line x1="234" y1="144" x2="224" y2="178" stroke="#4a6bbf" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="5 7"/>
  <line x1="260" y1="144" x2="250" y2="178" stroke="#4a6bbf" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="5 7"/>
  <line x1="286" y1="144" x2="276" y2="178" stroke="#4a6bbf" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="5 7"/>
  <line x1="312" y1="144" x2="302" y2="178" stroke="#4a6bbf" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="5 7"/>

  <!-- Wordmark — CMYK 93,0,63,40 → #096137 -->
  <text x="250" y="220" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="700" letter-spacing="1" fill="#096137">RainCheck</text>
  <text x="250" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="6" fill="#096137">AFRICA</text>
</svg>
