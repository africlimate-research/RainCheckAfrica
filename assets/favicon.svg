<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <title>RainCheck Africa</title>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" fill="#213c7d"/>

  <!-- Cloud — white -->
  <ellipse cx="24" cy="28" rx="10" ry="8" fill="white"/>
  <ellipse cx="32" cy="25" rx="10" ry="8" fill="white"/>
  <ellipse cx="40" cy="28" rx="9" ry="7" fill="white"/>
  <rect x="14" y="30" width="36" height="8" rx="3" fill="white"/>

  <!-- Checkmark — navy, matching background -->
  <polyline points="22,29 28,35 42,20" fill="none" stroke="#213c7d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dashed rain — light blue -->
  <line x1="20" y1="40" x2="17" y2="52" stroke="#4a6bbf" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="3 5"/>
  <line x1="28" y1="40" x2="25" y2="52" stroke="#4a6bbf" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="3 5"/>
  <line x1="36" y1="40" x2="33" y2="52" stroke="#4a6bbf" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="3 5"/>
  <line x1="44" y1="40" x2="41" y2="52" stroke="#4a6bbf" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="3 5"/>
</svg>
